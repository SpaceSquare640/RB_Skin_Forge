name: Bug report
description: Something isn't working in RB Skin Forge
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please skim the
        [FAQ](https://github.com/SpaceSquare640/RB_Skin_Forge/wiki/FAQ) first — common
        issues (binary FBX, blank HTML page, APK install, decimation) are answered there.

  - type: dropdown
    id: version
    attributes:
      label: Which version are you using?
      options:
        - HTML (browser / live demo)
        - Windows (.exe / installer)
        - Android (.apk)
    validations:
      required: true

  - type: input
    id: app-version
    attributes:
      label: App / release version
      description: See the footer of the app or the Releases page.
      placeholder: v0.2.0

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Choose body part / file ...
        3. Click Generate
        4. See ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?

  - type: dropdown
    id: asset-type
    attributes:
      label: Input asset type (if relevant)
      options:
        - Not applicable
        - Image (PNG / JPG / BMP / TGA)
        - Mesh — OBJ
        - Mesh — FBX (ASCII)

  - type: textarea
    id: console
    attributes:
      label: Console & Stats log
      description: >
        Paste the log from the Console & Stats panel (use the "Download log" button).
        This is the single most helpful thing you can include.
      render: text

  - type: input
    id: environment
    attributes:
      label: OS / browser
      placeholder: Windows 11 + Chrome 124, or Android 14, etc.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I checked the [FAQ](https://github.com/SpaceSquare640/RB_Skin_Forge/wiki/FAQ) and existing issues.
          required: true
        - label: I have NOT pasted any private tokens, passwords or credentials.
          required: true
