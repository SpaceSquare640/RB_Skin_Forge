name: Feature request
description: Suggest an idea or improvement for RB Skin Forge
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Check the roadmap on the
        [Features](https://github.com/SpaceSquare640/RB_Skin_Forge/wiki/Features) wiki page
        in case it's already planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like RB Skin Forge to do?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      multiple: true
      options:
        - 2D / clothing templates
        - 3D / meshes
        - Auto-rigging
        - UI / UX
        - Localization / languages
        - Packaging / distribution
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for a similar request.
          required: true
