name: Deploy HTML version to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'Source_Code/RB_Skin_Forge.Web/**'
      - 'Source_Code/RB_Skin_Forge.Core/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish Blazor WASM
        run: dotnet publish Source_Code/RB_Skin_Forge.Web/RB_Skin_Forge.Web.csproj -c Release -o publish

      - name: Set base href for project Pages (/RB_Skin_Forge/)
        run: sed -i 's|<base href="/" />|<base href="/RB_Skin_Forge/" />|' publish/wwwroot/index.html

      - name: Add SPA 404 fallback and disable Jekyll
        run: |
          cp publish/wwwroot/index.html publish/wwwroot/404.html
          touch publish/wwwroot/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: publish/wwwroot

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
